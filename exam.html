<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSetu Telugu | Online Exam</title>

    <link rel="stylesheet" href="exam.css">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="exam-wrapper">

    <!-- ================= HEADER ================= -->

    <header class="exam-header">

        <div class="logo-section">

            <img src="logo.png" alt="Logo">

            <div>

                <h2>JOBSETU TELUGU</h2>

                <p>AI Powered Government Competitive Exam Platform</p>

            </div>

        </div>

        <div class="exam-title">

            <h2>TGPSC Mock Test - 01</h2>

            <p>General Studies | 100 Questions | 90 Minutes</p>

        </div>

        <div class="header-right">

            <div class="timer-box">

                <i class="fa-solid fa-clock"></i>

                <span id="timer">90:00</span>

            </div>

            <div class="candidate-box">

                <i class="fa-solid fa-user"></i>

                <div>

                    <h4 id="candidateName">Guest</h4>

                    <p>Online</p>

                </div>

            </div>

        </div>

    </header>

    <!-- ================= Progress ================= -->

    <section class="progress-section">

        <div class="progress-text">

            <span>Progress</span>

            <span id="progressText">0 / 100 Answered</span>

        </div>

        <div class="progress-bar">

            <div id="progressFill"></div>

        </div>

    </section>

    <!-- ================= MAIN ================= -->

    <main class="exam-main">

        <!-- LEFT -->

        <section class="question-section">

            <div class="question-header">

                <span id="questionNumber">

                    Question 1 of 100

                </span>

            </div>

            <div class="question-card">

                <h3 id="questionText">

                    Loading Question...

                </h3>

                <div id="optionsContainer" class="optionsContainer">

                    <!-- Options will load here -->

                </div>

            </div>

            <div class="navigation-buttons">

                <button id="prevBtn" class="btn secondary">

                    <i class="fa-solid fa-arrow-left"></i>

                    Previous

                </button>

                <button id="clearBtn" class="btn warning">

                    Clear Response

                </button>

                <button id="reviewBtn" class="btn review">

                    Mark For Review

                </button>

                <button id="saveNextBtn" class="btn primary">

                    Save & Next

                    <i class="fa-solid fa-arrow-right"></i>

                </button>

            </div>

        </section>

        <!-- RIGHT -->

        <aside class="palette-section">

            <div class="palette-card">

                <h3>Question Palette</h3>

                <div id="palette" class="palette-grid">

                    <!-- JS Creates Buttons -->

                </div>

                <button id="submitBtn" class="submit-btn">

                    Submit Test

                </button>

            </div>

            <div class="legend-card">

                <h3>Legend</h3>

                <div class="legend-item">

                    <span class="box answered"></span>

                    Answered

                </div>

                <div class="legend-item">

                    <span class="box review"></span>

                    Review

                </div>

                <div class="legend-item">

                    <span class="box current"></span>

                    Current

                </div>

                <div class="legend-item">

                    <span class="box notanswered"></span>

                    Not Answered

                </div>

                <div class="legend-item">

                    <span class="box notvisited"></span>

                    Not Visited

                </div>

            </div>

        </aside>

    </main>

</div>

<script src="exam.js"></script>

</body>
</html>
