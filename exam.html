<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobSetu Telugu | Online Exam</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="exam-page">

<!-- ================= HEADER ================= -->

<header class="exam-header">

<div class="exam-logo">

<img src="logo.png">

<div>

<h2>JOBSETU TELUGU</h2>

<p>AI Powered Government Competitive Exam Platform</p>

</div>

</div>

<div class="exam-right">

<div class="timer-box">

<i class="fa-solid fa-clock"></i>

<span id="timer">25:00</span>

</div>

<div class="candidate">

<div class="candidate-icon">

<i class="fa-solid fa-user"></i>

</div>

<div>

<h4>Vinod Kumar</h4>

<p>Online</p>

</div>

</div>

</div>

</header>

<!-- ================= MAIN ================= -->

<div class="exam-container">

<!-- LEFT SIDE -->

<div class="question-panel">

<div class="question-top">

<span class="question-number">

Question <span id="questionNo">1</span> / 25

</span>

</div>

<div class="question-card">

<h3 id="questionText">

Loading Question...

</h3>

<div id="options" class="options">

<!-- Options Loaded Here -->

</div>

</div>

<div class="question-buttons">

<button id="prevBtn">

<i class="fa-solid fa-arrow-left"></i>

Previous

</button>

<button id="saveNextBtn">Save & Next</button>
Next

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="palette-panel">

<div class="palette-card">

<h3>

Question Palette

</h3>

<div id="palette" class="palette">

<!-- Palette Buttons -->

</div>

<button id="submitBtn">

Submit Test

</button>

</div>

<div class="status-card">

<h3>Legend</h3>

<div class="legend">

<div class="legend-item">

<div class="box answered"></div>

Answered

</div>

<div class="legend-item">

<div class="box current"></div>

Current

</div>

<div class="legend-item">

<div class="box notvisited"></div>

Not Visited

</div>

</div>

</div>

</div>

</div>

</div>

<script src="exam.js"></script>

</body>

</html>
