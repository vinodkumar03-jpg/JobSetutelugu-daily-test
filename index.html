<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSetu Telugu - Daily Test</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .container{
            max-width:700px;
            margin:50px auto;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.5);
        }

        h1{
            text-align:center;
            color:#38bdf8;
            margin-bottom:10px;
        }

        h3{
            text-align:center;
            margin-bottom:25px;
            color:#cbd5e1;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:10px;
            margin-bottom:20px;
            border:none;
            border-radius:8px;
            font-size:16px;
        }

        .details{
            background:#334155;
            padding:20px;
            border-radius:10px;
            margin:20px 0;
            line-height:2;
        }

        button{
            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        footer{
            text-align:center;
            margin-top:25px;
            color:#94a3b8;
        }
    </style>

</head>

<body>

<div class="container">

<h1>JOBSETU TELUGU</h1>

<h3>Daily Competitive Exam Practice Test</h3>

<label>Student Name</label>

<input type="text" placeholder="Enter your Name">

<label>Mobile Number</label>

<input type="text" placeholder="Enter Mobile Number">

<div class="details">

<b>Today's Test</b><br>

Subject : General Knowledge<br>

Questions : 25<br>

Duration : 25 Minutes<br>

Marks : 25

</div>

<button onclick="startTest()">START TEST</button>

<footer>

© JobSetu Telugu

</footer>

</div>

<script>

function startTest(){

alert("Congratulations! Home Page Created Successfully.\n\nNext we will create the Question Page.");

}

</script>

</body>
</html>
