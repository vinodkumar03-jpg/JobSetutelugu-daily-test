<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSetu Telugu - Daily Test</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>JOBSETU TELUGU</h1>

    <h3>Daily Competitive Exam Practice Test</h3>

    <label for="studentName">Student Name</label>
    <input type="text" id="studentName" placeholder="Enter your Name">

    <label for="mobileNumber">Mobile Number</label>
    <input type="text" id="mobileNumber" placeholder="Enter Mobile Number">

    <div class="details">
        <b>Today's Test</b><br><br>

        Subject : General Knowledge<br>
        Questions : 25<br>
        Duration : 25 Minutes<br>
        Marks : 25
    </div>

    <button onclick="startTest()">START TEST</button>

    <footer>
        © JobSetu Telugu
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>

<script src="script.js"></script>

</body>
</html>
