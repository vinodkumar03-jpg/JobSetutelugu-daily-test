<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobSetu Telugu - Online Test</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="exam-header">

    <div class="left">

        <img src="logo.png" class="small-logo">

        <div>

            <h2>JOBSETU TELUGU</h2>

            <p>Daily Mock Test Series</p>

        </div>

    </div>

    <div class="timer">

        ⏱ <span id="timer">25:00</span>

    </div>

</div>

<div class="student-box">

    <h3>
        Welcome,
        <span id="studentName"></span>
    </h3>

    <p>Total Questions : <b id="totalQuestions">25</b></p>

</div>

<div class="progress">

    <div id="progressBar"></div>

</div>

<div class="main-container">

<div class="question-section">

<h2 id="questionNumber">

Question 1

</h2>

<h3 id="questionText">

Loading Question...

</h3>

<div id="options">

</div>

<div class="buttons">

<button onclick="previousQuestion()">

◀ Previous

</button>

<button onclick="nextQuestion()">

Next ▶

</button>

</div>

</div>

<div class="palette">

<h3>

Questions

</h3>

<div id="paletteButtons">

</div>

</div>

</div>

<script src="test.js"></script>

</body>
</html>
