<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobSetu Telugu Test</title>

<link rel="stylesheet" href="style.css">

<style>

.question-box{
    margin-top:30px;
}

.option{
    background:#334155;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#2563eb;
}

#timer{
    font-size:24px;
    color:#38bdf8;
    text-align:right;
    margin-bottom:20px;
    font-weight:bold;
}

#questionNumber{
    color:#38bdf8;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    gap:15px;
}

.buttons button{
    flex:1;
}

</style>

</head>

<body>

<div class="container">

<h1>JOBSETU TELUGU</h1>

<div id="timer">
25:00
</div>

<h3 id="student"></h3>

<div class="question-box">

<h3 id="questionNumber"></h3>

<h2 id="question"></h2>

<div id="options"></div>

</div>

<div class="buttons">

<button onclick="previousQuestion()">
Previous
</button>

<button id="nextBtn" onclick="nextQuestion()">
Next
</button>

</div>

</div>

<script src="test.js"></script>

</body>

</html>
