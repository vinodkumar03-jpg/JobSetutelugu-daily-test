<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobSetu Telugu Test</title>

<link rel="stylesheet" href="style.css">

<style>

.question-box{
    margin-top:30px;
}

.option{
    background:#334155;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#2563eb;
}

#timer{
    font-size:24px;
    color:#38bdf8;
    text-align:right;
    margin-bottom:20px;
    font-weight:bold;
}

#questionNumber{
    color:#38bdf8;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    gap:15px;
}

.buttons button{
    flex:1;
}

.test-layout{
    display:flex;
    gap:20px;
}

.left-panel{
    flex:3;
}

.right-panel{
    flex:1;
}

#palette{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>JOBSETU TELUGU</h1>

<div id="timer">25:00</div>

<h3 id="student"></h3>

<div class="test-layout">

    <div class="left-panel">

        <div class="question-box">

            <h3 id="questionNumber"></h3>

            <h2 id="question"></h2>

            <div id="options"></div>

        </div>

    </div>

    <div class="right-panel">

        <h3>Questions</h3>

        <div id="palette"></div>

    </div>

</div>

<div class="buttons">

<button onclick="previousQuestion()">Previous</button>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

</div>

</div>

<script src="test.js"></script>

</body>
</html>
