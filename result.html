<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobSetu Telugu - Result</title>

<link rel="stylesheet" href="css/result.css">

</head>

<body>

<div class="result-container">

    <div class="result-card">

        <div class="header">

            <img src="images/logo.png" alt="Logo">

            <h1>JobSetu Telugu</h1>

            <h2>Online Mock Test Result</h2>

        </div>

        <div class="candidate-section">

            <h3 id="candidateName">Candidate Name</h3>

            <p id="submittedTime"></p>

        </div>

        <div class="score-circle">

            <div class="circle">

                <span id="percentage">0%</span>
            </div>

            <h3 id="status">PASS</h3>

        </div>

        <div class="result-grid">

            <div class="box">
                <h4>Total Questions</h4>
                <p id="totalQuestions">0</p>
            </div>

            <div class="box">
                <h4>Attempted</h4>
                <p id="attempted">0</p>
            </div>

            <div class="box">
                <h4>Not Attempted</h4>
                <p id="notAttempted">0</p>
            </div>

            <div class="box">
                <h4>Correct Answers</h4>
                <p id="correct">0</p>
            </div>

            <div class="box">
                <h4>Wrong Answers</h4>
                <p id="wrong">0</p>
            </div>

            <div class="box">
                <h4>Marks</h4>
                <p id="marks">0</p>
            </div>

        </div>

        <div class="buttons">

            <button id="reviewBtn">
                Review Answers
            </button>

            <button id="dashboardBtn">
                Dashboard
            </button>

        </div>

    </div>

</div>

<script src="js/result.js"></script>

</body>

</html>
